codecov:
  require_ci_to_pass: true

# Files excluded from patch coverage: IntelliJ platform classes (Swing panels,
# AnActions, editor listeners, notification providers) require a live IntelliJ
# runtime to instantiate and cannot be unit-tested in isolation. They are covered
# by manual testing and the integration-tests module.
ignore:
  - "**/*Panel.java"
  - "**/*Panel.kt"
  - "**/*Window.kt"
  - "**/*Window.java"
  - "**/*Action.java"
  - "**/AgentEditHighlighter.java"
  - "**/AgentEditNotificationProvider.java"
  - "**/RevertReasonDialog.java"

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        # Lowered from 80%: IntelliJ plugin PRs include UI/platform classes that
        # are excluded above, but service classes with platform dependencies still
        # can't reach 80%. 15% enforces a meaningful minimum while remaining
        # achievable for platform-heavy changes.
        target: 15%

flags:
  plugin-core:
    paths:
      - plugin-core/src/main/
    carryforward: true
  chat-ui:
    paths:
      - plugin-core/chat-ui/src/
    carryforward: true
  mcp-server:
    paths:
      - mcp-server/src/main/
    carryforward: true
  plugin-experimental:
    paths:
      - plugin-experimental/src/main/
    carryforward: true
