<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <defs>
    <!-- Streaming shader colors: blue (#4A9EFF) -> cyan (#00D4FF) -->
    <linearGradient id="vGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A9EFF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>

    <!-- Green gradient for the top circle -->
    <radialGradient id="circleGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </radialGradient>
  </defs>

  <!-- Left inverted V (Λ) -->
  <g fill="none" stroke="url(#vGradient)" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
    <polyline points="1,21 7,3 13,21"/>
  </g>

  <!-- Right inverted V (Λ) -->
  <g fill="none" stroke="url(#vGradient)" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
    <polyline points="11,21 17,3 23,21"/>
  </g>

  <!-- Filled circle at middle top -->
  <circle cx="12" cy="3" r="2" fill="url(#circleGradient)"/>
</svg>