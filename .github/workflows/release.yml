name: Release

on:
  push:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  # Only one release job runs at a time. cancel-in-progress: false means a second
  # push queues rather than being dropped. GitHub keeps at most one pending run per
  # group, so a burst of merges still collapses correctly: the queued run will see
  # all commits accumulated since the tag the running job is about to create.
  group: release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Version, Tag & Build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0  # Full history for conventional commit analysis

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: plugin-core/chat-ui/package-lock.json

      - name: Install chat-ui dependencies
        run: npm ci --silent --ignore-scripts
        working-directory: plugin-core/chat-ui

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
        with:
          gradle-version: 'wrapper'
          cache-disabled: true

      - name: Determine next version
        id: version
        run: |
          # Get the latest tag (semver), or default to 0.0.0
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Strip the 'v' prefix
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Analyze commits since the last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LATEST_TAG}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type from conventional commits
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE '^[a-z]+(\(.+\))?!:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE 'BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE '^feat(\(.+\))?:'; then
            BUMP="minor"
          fi

          # Calculate new version
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP → v${NEW_VERSION}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        if: steps.version.outputs.skip != 'true'
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.version }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p build

          # HTML changelog for plugin.xml: all changes since marketplace-latest
          # (accumulates across releases until next marketplace publish)
          bash scripts/generate-changelog.sh > build/changelog.html

          # Markdown: what changed in THIS release (since last v* tag)
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          CHANGELOG_BASELINE="${LATEST_TAG:-}" CHANGELOG_FORMAT=md \
            bash scripts/generate-changelog.sh > build/this-release.md

          # Markdown: accumulated changes since last marketplace publish
          CHANGELOG_FORMAT=md \
            bash scripts/generate-changelog.sh > build/since-marketplace.md

          # Assemble GitHub release body with both sections
          {
            cat build/this-release.md
            echo ""
            # Only add the "since marketplace" section if the baselines differ
            # (i.e., marketplace-latest is behind the latest v* tag)
            if ! diff -q build/this-release.md build/since-marketplace.md >/dev/null 2>&1; then
              echo "---"
              echo ""
              echo "<details><summary>All changes since last Marketplace publish</summary>"
              echo ""
              cat build/since-marketplace.md
              echo ""
              echo "</details>"
            fi
          } > build/release-notes.md

          echo "### Plugin Changelog (HTML for marketplace)" >> "$GITHUB_STEP_SUMMARY"
          echo '```html' >> "$GITHUB_STEP_SUMMARY"
          cat build/changelog.html >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "### Release Notes (Markdown)" >> "$GITHUB_STEP_SUMMARY"
          cat build/release-notes.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build release ZIPs
        if: steps.version.outputs.skip != 'true'
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.version }}
          CHANGELOG_FILE: build/changelog.html
        run: gradle :plugin-core:buildPlugin :plugin-experimental:buildPlugin --no-daemon --quiet

      - name: Collect release artifacts
        if: steps.version.outputs.skip != 'true'
        id: artifacts
        run: |
          # Copy artifacts to a staging directory with predictable names
          mkdir -p release-artifacts
          cp plugin-core/build/distributions/*.zip release-artifacts/
          cp plugin-experimental/build/distributions/*.zip release-artifacts/
          echo "dir=release-artifacts" >> "$GITHUB_OUTPUT"
          ls -la release-artifacts/

      - name: Generate provenance attestation
        if: steps.version.outputs.skip != 'true'
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: '${{ steps.artifacts.outputs.dir }}/*.zip'

      - name: Stage provenance bundle for release upload
        if: steps.version.outputs.skip != 'true'
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
          ARTIFACTS_DIR: ${{ steps.artifacts.outputs.dir }}
        run: cp "$BUNDLE_PATH" "$ARTIFACTS_DIR/provenance.intoto.jsonl"

      - name: Install cosign
        if: steps.version.outputs.skip != 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign release artifacts with cosign
        if: steps.version.outputs.skip != 'true'
        env:
          ARTIFACTS_DIR: ${{ steps.artifacts.outputs.dir }}
        run: |
          for artifact in "$ARTIFACTS_DIR"/*.zip; do
            cosign sign-blob --yes \
              --bundle "${artifact}.sigstore.json" \
              "$artifact"
          done

      - name: Authenticate git for tag push
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh auth setup-git

      - name: Create tag and GitHub release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          ARTIFACTS_DIR: ${{ steps.artifacts.outputs.dir }}
        run: |
          # Create tag + release via GitHub API (no git credentials needed;
          # persist-credentials: false is set on checkout for security)
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "Release $TAG" \
            --notes-file build/release-notes.md \
            "$ARTIFACTS_DIR"/*.zip \
            "$ARTIFACTS_DIR"/*.sigstore.json \
            "$ARTIFACTS_DIR"/provenance.intoto.jsonl

      - name: Publish plugin ZIPs to GitHub Packages
        if: steps.version.outputs.skip != 'true'
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.version }}
          CHANGELOG_FILE: build/changelog.html
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Publish to GitHub Packages (Maven layout) so users have a real
          # package-registry distribution channel in addition to the GitHub
          # release ZIP and the JetBrains Marketplace listing. Also gives
          # OpenSSF Scorecard's "Packaging" check something to detect.
          #
          # Skip if this version is already published (handles workflow reruns):
          # GitHub Packages returns 409 Conflict on duplicate uploads.
          POM_URL="https://maven.pkg.github.com/catatafishen/agentbridge/com/github/catatafishen/ideagentforcopilot/${PLUGIN_VERSION}/ideagentforcopilot-${PLUGIN_VERSION}.pom"
          if curl -sf -o /dev/null -u "${GITHUB_ACTOR}:${GITHUB_TOKEN}" "${POM_URL}" 2>/dev/null; then
            echo "Version ${PLUGIN_VERSION} already published to GitHub Packages — skipping."
          else
            gradle :plugin-core:publish :plugin-experimental:publish --no-daemon --quiet
          fi
