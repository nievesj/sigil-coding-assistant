name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mcp-server-tests:
    name: MCP Server Tests
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
        with:
          gradle-version: 'wrapper'
          cache-disabled: true

      - name: Run MCP server tests
        run: gradle :mcp-server:test :mcp-server:jacocoTestReport --no-daemon --quiet --build-cache

      - name: Upload MCP server coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: mcp-server/build/reports/jacoco/test/jacocoTestReport.xml
          flags: mcp-server
          disable_search: true
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Run plugin-experimental tests
        run: gradle :plugin-experimental:test :plugin-experimental:jacocoTestReport --no-daemon --quiet --build-cache -x :plugin-core:buildChatUi

      - name: Upload plugin-experimental coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: plugin-experimental/build/reports/jacoco/test/jacocoTestReport.xml
          flags: plugin-experimental
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            plugin-core/chat-ui/package-lock.json
            plugin-core/js-tests/package-lock.json

      - name: Install chat-ui dependencies
        run: npm ci --silent --ignore-scripts
        working-directory: plugin-core/chat-ui

      - name: Install JS test dependencies
        run: npm ci --silent --ignore-scripts
        working-directory: plugin-core/js-tests

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
        with:
          gradle-version: 'wrapper'
          cache-disabled: true

      - name: Run chat-ui tests with coverage
        run: npm run test:coverage
        working-directory: plugin-core/js-tests

      - name: Build chat-ui
        run: npm run build
        working-directory: plugin-core/chat-ui

      - name: Build plugins
        run: gradle :plugin-core:buildPlugin :plugin-experimental:buildPlugin --no-daemon --quiet

      - name: Run plugin tests
        run: gradle :plugin-core:test --no-daemon

      - name: Upload chat-ui coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: plugin-core/js-tests/coverage/lcov.info
          flags: chat-ui
          disable_search: true
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: plugin-core/build/reports/jacoco/test/jacocoTestReport.xml
          flags: plugin-core
          disable_search: true
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Show test failures
        if: failure()
        run: |
          python3 -c "
          import glob, xml.etree.ElementTree as ET
          for path in glob.glob('plugin-core/build/test-results/test/*.xml'):
              root = ET.parse(path).getroot()
              for tc in root.iter('testcase'):
                  for tag in ('failure', 'error'):
                      fail = tc.find(tag)
                      if fail is not None:
                          print('FAILED:', tc.get('classname') + '.' + tc.get('name'))
                          print((fail.get('message') or '') + chr(10) + (fail.text or '')[:3000])
          "

      - name: Upload plugin-core artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: plugin-core-pr-${{ github.event.pull_request.number }}
          path: plugin-core/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 7

  verify-marketplace:
    # Runs in parallel with build-and-test. Separated so a flaky verifier race
    # condition (ClosedFileSystemException in PluginJar.resolveDescriptors) can
    # be re-run independently without re-running the full build and test suite.
    #
    # The JetBrains plugin verifier downloads ~5 IDE distributions (3–5 GB each).
    # Free disk space is only needed here, keeping build-and-test leaner.
    name: Verify (Marketplace Compatibility)
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      # Ubuntu runners ship with ~14 GB free. IDE distributions easily exceed
      # this budget — free pre-installed software we don't use to reclaim ~30 GB.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1
        with:
          tool-cache: false        # keep the JDK tool cache populated by setup-java
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Show available disk space
        run: df -h /

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
        with:
          gradle-version: 'wrapper'
          cache-disabled: true

      - name: Create pluginVerifier cache directory
        run: mkdir -p ~/.pluginVerifier/extracted-plugins

      - name: Show disk space before plugin verification
        run: df -h /

      - name: Verify plugins (marketplace compatibility)
        # Skip buildChatUi: the npm/JS build is not needed for API compatibility
        # checks. The verifier only inspects class files and plugin descriptors.
        run: gradle :plugin-core:verifyPlugin --no-daemon --quiet -x :plugin-core:buildChatUi

      - name: Show disk space after plugin verification
        if: always()
        run: df -h /
