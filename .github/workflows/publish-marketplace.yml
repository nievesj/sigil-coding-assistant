name: Publish to JetBrains Marketplace

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (leave empty for latest release)'
        required: false
        type: string
        default: ''
      channel:
        description: 'Marketplace channel (leave as "stable" for production releases)'
        required: true
        type: choice
        options:
          - stable
          - eap
          - beta
        default: stable

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Step 0: Resolve release tag ──────────────────────────────────────
  resolve-tag:
    name: Resolve release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Resolve tag from input or latest release
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "Using provided tag: $INPUT_TAG"
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 5 \
              --json tagName,isPrerelease,isDraft \
              --jq '[.[] | select(.isPrerelease == false and .isDraft == false)][0].tagName')
            if [ -z "$LATEST" ]; then
              echo "::error::No releases found. Please specify a tag manually."
              exit 1
            fi
            echo "No tag provided — using latest release: $LATEST"
            echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          fi

      - name: Show recent releases for reference
        env:
          GH_TOKEN: ${{ github.token }}
          SELECTED_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          echo "### 🏷️ Recent releases" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | Date | Title |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          gh release list --repo "$GITHUB_REPOSITORY" --limit 10 \
            --json tagName,publishedAt,name \
            --jq '.[] | "| \(.tagName) | \(.publishedAt | split("T")[0]) | \(.name) |"' \
            >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Selected:** \`$SELECTED_TAG\`" >> "$GITHUB_STEP_SUMMARY"

  # ── Step 1: Show release notes for review and editing ───────────────
  # Fetches the GitHub Release body (editable markdown) so you can review and
  # optionally edit it on GitHub before approving the upload.
  preview:
    name: Preview changelog for ${{ needs.resolve-tag.outputs.tag }}
    needs: resolve-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Display release notes for review
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          # Fetch the release body (markdown) — editable on GitHub before approval.
          # The publish job will re-fetch the final version after any edits.
          gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json body --jq '.body' > release-body.md

          EDIT_URL="https://github.com/$GITHUB_REPOSITORY/releases/edit/$RELEASE_TAG"

          {
            echo "### 📝 Marketplace change notes for $RELEASE_TAG"
            echo ""
            echo "The release notes below will be converted to HTML and published"
            echo "as the marketplace change notes."
            echo ""
            echo "---"
            echo ""
            cat release-body.md
            echo ""
            echo "---"
            echo ""
            echo "**Channel:** \`$CHANNEL\`"
            echo ""
            echo "### ✏️ Want to edit before publishing?"
            echo ""
            echo "1. [**Edit the release notes on GitHub**]($EDIT_URL)"
            echo "2. Modify the body — it will be converted to HTML for the marketplace"
            echo "3. Save your changes"
            echo "4. Then approve the **marketplace** environment below"
            echo ""
            echo "> If the notes look good as-is, just approve directly."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Step 2: Gate on IDE compatibility check ─────────────────────────
  # Blocks publishing if the ide-compatibility workflow has not run on the
  # release commit, is still running, or failed.
  check-compatibility:
    name: Check IDE compatibility for ${{ needs.resolve-tag.outputs.tag }}
    needs: [ resolve-tag, preview ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Check IDE compatibility run status
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          # Resolve the commit SHA the release tag points to.
          # Release tags can be annotated (object type "tag") or lightweight
          # (object type "commit") — dereference annotated tags one level.
          OBJ_TYPE=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" \
            --jq '.object.type')
          OBJ_SHA=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" \
            --jq '.object.sha')
          if [ "$OBJ_TYPE" = "tag" ]; then
            COMMIT_SHA=$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$OBJ_SHA" \
              --jq '.object.sha')
          else
            COMMIT_SHA="$OBJ_SHA"
          fi
          echo "Release tag: $RELEASE_TAG → commit $COMMIT_SHA"

          # Find the most recent ide-compatibility run for this exact commit.
          RUNS=$(gh api \
            "repos/$GITHUB_REPOSITORY/actions/workflows/ide-compatibility.yml/runs?head_sha=$COMMIT_SHA&per_page=10" \
            --jq '.workflow_runs | sort_by(.created_at) | reverse')
          TOTAL=$(echo "$RUNS" | jq 'length')
          echo "Found $TOTAL ide-compatibility run(s) for commit $COMMIT_SHA"

          if [ "$TOTAL" = "0" ]; then
            echo "::error::No IDE compatibility check has been run for $RELEASE_TAG (commit $COMMIT_SHA)."
            echo "Trigger the 'IDE Compatibility Check' workflow manually for this commit, wait for it to pass, then retry publishing."
            exit 1
          fi

          LATEST_STATUS=$(echo "$RUNS" | jq -r '.[0].status')
          LATEST_CONCLUSION=$(echo "$RUNS" | jq -r '.[0].conclusion')
          LATEST_URL=$(echo "$RUNS" | jq -r '.[0].html_url')
          echo "Latest run: status=$LATEST_STATUS conclusion=$LATEST_CONCLUSION"
          echo "Run URL: $LATEST_URL"

          if [ "$LATEST_STATUS" != "completed" ]; then
            echo "::error::IDE compatibility check is still running for $RELEASE_TAG."
            echo "Wait for it to complete before publishing to the marketplace."
            echo "Check: $LATEST_URL"
            exit 1
          fi

          if [ "$LATEST_CONCLUSION" != "success" ]; then
            echo "::error::IDE compatibility check failed for $RELEASE_TAG (conclusion: $LATEST_CONCLUSION)."
            echo "Fix the compatibility issues before publishing to the marketplace."
            echo "Check: $LATEST_URL"
            exit 1
          fi

          {
            echo "### ✅ IDE Compatibility"
            echo ""
            echo "IDE compatibility check **passed** for \`$RELEASE_TAG\`."
            echo ""
            echo "Run: $LATEST_URL"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "IDE compatibility check passed — proceeding with marketplace publish."

  # ── Step 3: Upload (requires 'marketplace' environment approval) ──────
  publish:
    name: Upload ${{ needs.resolve-tag.outputs.tag }} to JetBrains Marketplace
    needs: [ resolve-tag, preview, check-compatibility ]
    runs-on: ubuntu-latest
    environment: marketplace
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download plugin ZIP from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "agentbridge-*.zip" \
            --dir release-artifacts
          ls -la release-artifacts/

      - name: Read release notes and convert to HTML
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          # Re-fetch release body (user may have edited it after preview was shown)
          gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json body --jq '.body' > release-body.md

          # Convert GFM → HTML using GitHub's own Markdown API (via gh CLI).
          # This avoids a pandoc dependency (not pre-installed on ubuntu-24.04 runners)
          # and produces identical output to what GitHub itself renders.
          python3 - <<'PYEOF'
          import json, subprocess, os, re

          body = open('release-body.md').read()

          # The release body may have two sections:
          #   1. "This release" changes (since last v* tag)
          #   2. <details><summary>All changes since last Marketplace publish</summary>
          # For the marketplace we only want the accumulated since-marketplace section.
          # If that section is absent (first publish, both sections are identical),
          # fall back to the full body.
          details_match = re.search(
              r'<details><summary>All changes since last Marketplace publish</summary>\s*(.*?)\s*</details>',
              body, flags=re.DOTALL
          )
          if details_match:
              body = details_match.group(1).strip()

          payload = json.dumps({
              'text': body,
              'mode': 'gfm',
              'context': os.environ.get('GITHUB_REPOSITORY', ''),
          })
          result = subprocess.run(
              ['gh', 'api', '/markdown', '--input', '-'],
              input=payload.encode(),
              capture_output=True,
              check=True,
          )
          html = result.stdout.decode()

          # Strip <details>/<summary> wrappers but keep the inner content visible.
          # The JetBrains Marketplace may not render these HTML elements.
          html = re.sub(r'<details[^>]*>', '', html)
          html = html.replace('</details>', '')
          html = re.sub(r'<summary[^>]*>.*?</summary>', '', html, flags=re.DOTALL)

          open('release-body.html', 'w').write(html)
          PYEOF

          # Assemble: static header + converted release notes
          {
            printf '<p><b>AgentBridge</b> connects AI coding agents to your IDE via 100+ MCP tools\n'
            printf 'for code intelligence, navigation, editing, debugging, and git.</p>\n'
            printf '<p>\n'
            printf '  <a href="https://github.com/%s">GitHub</a> &middot;\n' "$GITHUB_REPOSITORY"
            printf '  <a href="https://github.com/%s/releases">All Releases</a>\n' "$GITHUB_REPOSITORY"
            printf '</p>\n'
            printf '<hr/>\n'
            cat release-body.html
          } > marketplace-changelog.html

          echo "### 📋 Generated marketplace HTML" >> "$GITHUB_STEP_SUMMARY"
          echo '```html' >> "$GITHUB_STEP_SUMMARY"
          cat marketplace-changelog.html >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Patch plugin ZIP with updated changelog
        run: |
          PLUGIN_ZIP=$(ls release-artifacts/agentbridge-*.zip | head -1)
          echo "Patching: $PLUGIN_ZIP"

          # Unzip the outer plugin distribution
          mkdir -p work/plugin
          unzip -o -q "$PLUGIN_ZIP" -d work/plugin

          # Find the JAR that contains META-INF/plugin.xml
          MAIN_JAR=$(find work/plugin -name '*.jar' -exec \
            sh -c 'unzip -l "$1" META-INF/plugin.xml >/dev/null 2>&1 && echo "$1"' _ {} \; \
            | head -1)

          if [[ -z "$MAIN_JAR" ]]; then
            echo "::error::Could not find plugin JAR with META-INF/plugin.xml"
            exit 1
          fi
          echo "Plugin JAR: $MAIN_JAR"

          # Extract plugin.xml from the JAR for patching
          mkdir -p work/xml/META-INF
          unzip -o -q "$MAIN_JAR" META-INF/plugin.xml -d work/xml

          # Patch <change-notes> in plugin.xml with the generated HTML
          python3 - <<'PYEOF'
          import re

          with open('work/xml/META-INF/plugin.xml') as f:
              xml = f.read()

          with open('marketplace-changelog.html') as f:
              notes = f.read()

          patched = re.sub(
              r'<change-notes>.*?</change-notes>',
              '<change-notes><![CDATA[\n' + notes + '\n]]></change-notes>',
              xml, flags=re.DOTALL
          )

          if patched == xml:
              print('::warning::No <change-notes> section found — changelog not patched')
          else:
              print('Patched <change-notes> section in plugin.xml')

          with open('work/xml/META-INF/plugin.xml', 'w') as f:
              f.write(patched)
          PYEOF

          # Update the JAR with the modified plugin.xml
          MAIN_JAR_ABS=$(realpath "$MAIN_JAR")
          (cd work/xml && zip -q "$MAIN_JAR_ABS" META-INF/plugin.xml)

          # Repackage the outer ZIP
          PATCHED_ZIP="patched-$(basename "$PLUGIN_ZIP")"
          (cd work/plugin && zip -r -q "../../$PATCHED_ZIP" .)

          # Replace original with patched version
          rm -rf release-artifacts
          mkdir release-artifacts
          mv "$PATCHED_ZIP" "release-artifacts/$(basename "$PLUGIN_ZIP")"
          echo "Patched ZIP ready: release-artifacts/$(basename "$PLUGIN_ZIP")"

      - name: Upload to JetBrains Marketplace
        env:
          JETBRAINS_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          PLUGIN_ZIP=$(ls release-artifacts/agentbridge-*.zip | head -1)
          echo "Uploading: $PLUGIN_ZIP to channel '${CHANNEL}'"

          CURL_ARGS=(
            --header "Authorization: Bearer $JETBRAINS_TOKEN"
            -F "xmlId=com.github.catatafishen.ideagentforcopilot"
            -F "file=@$PLUGIN_ZIP"
          )
          # The stable channel is the default — only pass channel for non-stable uploads
          if [ "$CHANNEL" != "stable" ]; then
            CURL_ARGS+=(-F "channel=$CHANNEL")
          fi

          HTTP_STATUS=$(curl -s -o response.txt -w "%{http_code}" "${CURL_ARGS[@]}" \
            https://plugins.jetbrains.com/plugin/uploadPlugin)

          echo "--- Marketplace response ---"
          cat response.txt
          echo ""

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "Upload failed with HTTP status $HTTP_STATUS"
            exit 1
          fi
          echo "Successfully published $PLUGIN_ZIP to the JetBrains Marketplace"

      - name: Update marketplace-latest tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          gh auth setup-git
          # Move the marketplace-latest tag to the commit of the published release.
          # This tag is used by generate-changelog.sh to determine which commits
          # have not yet been published to the marketplace.
          TARGET_SHA=$(git rev-list -n1 "$RELEASE_TAG")
          git tag -f marketplace-latest "$TARGET_SHA"
          git push origin marketplace-latest --force
          echo "Updated marketplace-latest → $TARGET_SHA ($RELEASE_TAG)"

      - name: Tag release as pending marketplace review
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          # Remove any existing pending-review tags (handles retries cleanly)
          gh api "repos/$GITHUB_REPOSITORY/git/refs" --jq \
            '.[] | select(.ref | startswith("refs/tags/marketplace-pending-")) | .ref' \
            | while read -r REF; do
                gh api "repos/$GITHUB_REPOSITORY/git/$REF" -X DELETE
                echo "Removed stale tag: $REF"
              done

          # Push an annotated pending-review tag (tagger.date lets the check
          # workflow know how long the review has been in progress)
          TARGET_SHA=$(git rev-list -n1 "$RELEASE_TAG")
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git tag -a "marketplace-pending-$RELEASE_TAG" "$TARGET_SHA" \
            -m "Pending JetBrains Marketplace review for $RELEASE_TAG"
          git push origin "marketplace-pending-$RELEASE_TAG"
          echo "Tagged $RELEASE_TAG as pending marketplace review"
